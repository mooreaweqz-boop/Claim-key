<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REALPOOH PROXY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* การ์ดหลักดีไซน์ตามรูปแบบเรืองแสงสีแดง */
        .card {
            background-color: #0d0d0d;
            border: 2px solid #3a0b0b;
            border-radius: 40px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.15);
            position: relative;
        }

        /* โลโก้วงกลมเรืองแสง */
        .logo-container {
            width: 130px;
            height: 130px;
            margin: 0 auto 25px auto;
            border-radius: 50%;
            border: 3px solid #ff1a1a;
            box-shadow: 0 0 20px #ff0000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #141414;
        }

        .logo-container img {
            width: 85%;
            height: 85%;
            object-fit: contain;
        }

        /* หัวข้อหลัก */
        .title {
            color: #ffffff;
            font-size: 28px;
            font-weight: 800;
            margin: 0 0 8px 0;
            letter-spacing: 1px;
        }

        .title span {
            color: #ff3333;
        }

        .subtitle {
            color: #d4af37;
            font-size: 14px;
            margin-bottom: 30px;
            font-weight: 400;
        }

        /* ฟอร์มและอินพุต */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-label {
            color: #888888;
            font-size: 13px;
            margin-bottom: 8px;
            display: block;
            padding-left: 5px;
        }

        .input-field {
            width: 100%;
            background-color: #141414;
            border: 1px solid #262626;
            border-radius: 15px;
            padding: 18px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
            text-align: center;
        }

        .input-field:focus {
            border-color: #ff3333;
        }

        /* ปุ่มรับคีย์สีแดงเรืองแสง */
        .submit-btn {
            width: 100%;
            background: linear-gradient(180deg, #e60000 0%, #990000 100%);
            border: none;
            border-radius: 20px;
            padding: 16px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 5px 20px rgba(230, 0, 0, 0.4);
            transition: transform 0.1s, box-shadow 0.3s;
        }

        .submit-btn:hover {
            box-shadow: 0 5px 25px rgba(230, 0, 0, 0.6);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        /* ข้อความแจ้งเตือนด้านล่างสุด */
        .error-msg {
            color: #ff3333;
            font-size: 13px;
            margin-top: 25px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- โลโก้ (เปลี่ยนภาพใน src ได้ตามต้องการ) -->
        <div class="logo-container">
            <img src="https://via.placeholder.com/150" alt="REALPOOH LOGO">
        </div>

        <!-- หัวข้อ -->
        <h1 class="title">REALPOOH <span>PROXY</span></h1>
        <div class="subtitle">✨ ยินดีต้อนรับ! กรุณาเลือกจำนวนที่ต้องการนะ ✨</div>

        <!-- ฟอร์มรับข้อมูล -->
        <form id="keyForm" onsubmit="event.preventDefault(); alert('กำลังเจนคีย์...');">
            
            <!-- ส่วนเลือกจำนวนวัน -->
            <div class="input-group">
                <label class="input-label">📅 เลือกจำนวนวันที่ต้องการรับคีย์ (1 - 9999 วัน)</label>
                <input type="number" class="input-field" min="1" max="9999" value="1" required placeholder="ระบุจำนวนวัน">
            </div>

            <!-- ส่วนปรับจำนวนคีย์ -->
            <div class="input-group">
                <label class="input-label">🔑 ปรับจำนวนคีย์ที่ต้องการสร้าง</label>
                <input type="number" class="input-field" min="1" value="1" required placeholder="ระบุจำนวนคีย์">
            </div>

            <!-- ปุ่มกดยืนยัน -->
            <button type="submit" class="submit-btn">
                รับคีย์ 🚀
            </button>
        </form>

        <!-- ข้อความแจ้งเตือนท้ายการ์ด -->
        <div class="error-msg">
            งื้อออ คีย์ไม่ถูกต้องหรือหมดอายุแล้วงับ! 😭
        </div>
    </div>

</body>
</html>
